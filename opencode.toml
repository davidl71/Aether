# OpenCode project configuration
# See: https://github.com/opencode-ai/opencode

[context]
# Files automatically loaded into context for every session
files = [
  "AGENTS.md",
  "ARCHITECTURE.md",
]

[instructions]
# Additional project-specific instructions beyond AGENTS.md
text = """
Comprehensive multi-asset synthetic financing platform. Manages financing across options, futures, bonds, loans, and pension funds with unified portfolio management across 21+ accounts and multiple brokers (IBKR, Alpaca, Tradier, Tastytrade). Box spreads are one active strategy (spare cash, T-bill-equivalent yields).

Key paths:
- C++ source: native/src/
- C++ headers: native/include/
- Tests: native/tests/ (Catch2, mirror source names with test_ prefix)
- Build config: native/CMakeLists.txt
- Python layer: python/

Build: ninja -C build
Test: ctest --test-dir build --output-on-failure
Lint: ./scripts/run_linters.sh

Style: 2-space indent, Allman braces, PascalCase types, snake_case functions, k-prefixed constants.

Safety: never commit credentials, use paper trading port 7497, never modify native/third_party/ directly, all trading calculations must have tests.
"""
