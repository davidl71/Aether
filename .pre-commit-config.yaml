exclude: |
  (?x)^(
    native/third_party/.*|
    native/generated/.*|
    agents/go/proto/.*|
    web/src/proto/.*|
    \.todo2/.*
  )$

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: mixed-line-ending
  # Markdownlint: run manually (npm run lint:docs / make lint) or in CI.
  # Not in pre-commit so doc edits don't block commits; fix style in CI or when touching docs.
  # - repo: https://github.com/markdownlint/markdownlint
  #   rev: v0.13.0
  #   hooks:
  #     - id: markdownlint
  #       args: ["--config", ".markdownlint.json"]
  #       exclude: ^docs/MARKDOWNLINT.*\.md$
  # - repo: https://github.com/igorshubovych/markdownlint-cli
  #   rev: v0.39.0
  #   hooks:
  #     - id: markdownlint
  #       args: ["-c", "global_kit/.markdownlint.json"]
  #       exclude: ^docs/MARKDOWNLINT.*\.md$
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.7.0-4
    hooks:
      - id: shfmt
        args: ["-i", "2", "-ci", "-sr"]
  - repo: https://github.com/jumanjihouse/pre-commit-hooks
    rev: 3.0.0
    hooks:
      - id: shellcheck
        args: ["-x"]
  # Lint only staged files (after generation/edits, at commit time)
  - repo: local
    hooks:
      - id: lint-staged
        name: Lint staged Python (ruff)
        entry: scripts/lint_staged.sh
        language: system
        files: \.py$
