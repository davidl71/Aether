# Generic, formatter-friendly config.
select = ["B", "D3", "E", "F"]

# Never enforce `E501` (line length violations). This should be handled by formatters.
ignore = ["E501"]

# Intentional or third-party: E402, F401, F403, F405. B008 (FastAPI Depends),
# B904 (raise from), B905 (zip strict), D301 (docstring r prefix).
extend-ignore = ["E402", "F401", "F403", "F405", "B008", "B904", "B905", "D301"]
