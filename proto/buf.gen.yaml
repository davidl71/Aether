# buf.gen.yaml — code generation config for buf generate
# Run from repo root: cd proto && buf generate
# Rust is handled by prost via build.rs (nats_adapter crate) — not here.
# Python/betterproto is non-standard; see generate.sh for that path.
version: v2
inputs:
  - directory: .
plugins:
  # Go: protoc-gen-go must be on PATH (go install google.golang.org/protobuf/cmd/protoc-gen-go@latest)
  - local: protoc-gen-go
    out: ../agents/go/proto/v1
    opt:
      - paths=source_relative

  # TypeScript generation disabled - web/ folder archived (React PWA retired)
  # When web/ is reintroduced, re-enable ts-proto plugin here
