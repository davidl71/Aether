syntax = "proto3";

package ib.platform.v1;

option go_package = "github.com/dlowes/ib-platform/proto/v1;pbv1";

import "google/protobuf/timestamp.proto";

// ---------------------------------------------------------------------------
// Market Data
// ---------------------------------------------------------------------------

message MarketDataEvent {
  int64 contract_id = 1;
  string symbol = 2;
  double bid = 3;
  double ask = 4;
  double last = 5;
  uint64 volume = 6;
  google.protobuf.Timestamp timestamp = 7;
  uint32 quote_quality = 8;
}

message CandleSnapshot {
  double open = 1;
  double high = 2;
  double low = 3;
  double close = 4;
  uint64 volume = 5;
  double entry = 6;
  google.protobuf.Timestamp updated = 7;
}

message SymbolSnapshot {
  string symbol = 1;
  double last = 2;
  double bid = 3;
  double ask = 4;
  double spread = 5;
  double roi = 6;
  uint32 maker_count = 7;
  uint32 taker_count = 8;
  uint64 volume = 9;
  CandleSnapshot candle = 10;
}

// ---------------------------------------------------------------------------
// Positions & Orders
// ---------------------------------------------------------------------------

message Position {
  string id = 1;
  string symbol = 2;
  int32 quantity = 3;
  double cost_basis = 4;
  double mark = 5;
  double unrealized_pnl = 6;
}

message HistoricPosition {
  string id = 1;
  string symbol = 2;
  int32 quantity = 3;
  double realized_pnl = 4;
  google.protobuf.Timestamp closed_at = 5;
}

message Order {
  string id = 1;
  string symbol = 2;
  string side = 3;
  int32 quantity = 4;
  string status = 5;
  google.protobuf.Timestamp submitted_at = 6;
}

// ---------------------------------------------------------------------------
// Strategy
// ---------------------------------------------------------------------------

message StrategyDecision {
  string symbol = 1;
  int32 quantity = 2;
  string side = 3;
  double mark = 4;
  google.protobuf.Timestamp created_at = 5;
}

message StrategySignal {
  string symbol = 1;
  double price = 2;
  google.protobuf.Timestamp timestamp = 3;
}

// ---------------------------------------------------------------------------
// Risk
// ---------------------------------------------------------------------------

message RiskStatus {
  bool allowed = 1;
  string reason = 2;
  google.protobuf.Timestamp updated_at = 3;
}

message RiskLimit {
  string symbol = 1;
  int32 max_position = 2;
  double max_notional = 3;
}

// Portfolio and position risk configuration (aligns with native RiskConfig).
message RiskConfig {
  double max_total_exposure = 1;
  int32 max_positions = 2;
  double max_loss_per_position = 3;
  double max_daily_loss = 4;
  double position_size_percent = 5;
  bool enable_stop_loss = 6;
  double stop_loss_percent = 7;
  double risk_free_rate_override = 8;  // 0 = auto-detect from market data
}

// Risk decision (allow/deny) for reporting; aligns with RiskStatus semantics.
message RiskDecision {
  bool allowed = 1;
  string reason = 2;
  google.protobuf.Timestamp updated_at = 3;
}

// Position-level risk metrics (aligns with native risk::PositionRisk).
message PositionRisk {
  double position_size = 1;
  double max_loss = 2;
  double max_gain = 3;
  double expected_value = 4;
  double probability_of_profit = 5;
  double delta = 6;
  double gamma = 7;
  double theta = 8;
  double vega = 9;
  double rho = 10;
  double leverage = 11;
  double risk_reward_ratio = 12;
  double kelly_criterion = 13;
  double initial_margin = 14;
  double maintenance_margin = 15;
  double margin_utilization = 16;
  bool margin_call_risk = 17;
  google.protobuf.Timestamp margin_timestamp = 18;
}

// Portfolio-level risk metrics (aligns with native risk::PortfolioRisk).
message PortfolioRisk {
  double total_exposure = 1;
  double total_delta = 2;
  double total_gamma = 3;
  double total_theta = 4;
  double total_vega = 5;
  double var_95 = 6;
  double var_99 = 7;
  double expected_shortfall = 8;
  double concentration_risk = 9;
  double liquidity_risk = 10;
  double sharpe_ratio = 11;
  double sortino_ratio = 12;
  double max_drawdown = 13;
}

// ---------------------------------------------------------------------------
// System
// ---------------------------------------------------------------------------

message Alert {
  AlertLevel level = 1;
  string message = 2;
  google.protobuf.Timestamp timestamp = 3;
}

enum AlertLevel {
  ALERT_LEVEL_UNSPECIFIED = 0;
  ALERT_LEVEL_INFO = 1;
  ALERT_LEVEL_WARNING = 2;
  ALERT_LEVEL_ERROR = 3;
}

message Metrics {
  double net_liq = 1;
  double buying_power = 2;
  double excess_liquidity = 3;
  double margin_requirement = 4;
  double commissions = 5;
  bool portal_ok = 6;
  bool tws_ok = 7;
  reserved 8;
  bool questdb_ok = 9;
  bool nats_ok = 10;
}

message SystemSnapshot {
  google.protobuf.Timestamp generated_at = 1;
  google.protobuf.Timestamp started_at = 2;
  string mode = 3;
  string strategy = 4;
  string account_id = 5;
  Metrics metrics = 6;
  repeated SymbolSnapshot symbols = 7;
  repeated Position positions = 8;
  repeated HistoricPosition historic = 9;
  repeated Order orders = 10;
  repeated StrategyDecision decisions = 11;
  repeated Alert alerts = 12;
  RiskStatus risk = 13;
  string market_data_source = 14;
}

// Backend health payload for system.health NATS and REST /api/health.
// One message per backend; aggregators merge by backend id.
message BackendHealth {
  string backend = 1;           // e.g. "ib", "alpaca", "tradestation"
  string status = 2;          // "ok", "degraded", "error", "checking"
  google.protobuf.Timestamp updated_at = 3;
  string error = 4;           // optional error message when status != ok
  string hint = 5;            // optional hint for user
  map<string, string> extra = 6;  // backend-specific flags (e.g. ib_connected, session_mode)
}

// Aggregate health for dashboard GET /api/health (all backends).
message HealthAggregate {
  map<string, BackendHealth> backends = 1;
  google.protobuf.Timestamp generated_at = 2;
}

// ---------------------------------------------------------------------------
// NATS Envelope
// ---------------------------------------------------------------------------

message NatsEnvelope {
  string id = 1;
  google.protobuf.Timestamp timestamp = 2;
  string source = 3;
  string message_type = 4;
  bytes payload = 5;
}

// ---------------------------------------------------------------------------
// Box Spread
// ---------------------------------------------------------------------------

enum OptionTypeEnum {
  OPTION_TYPE_ENUM_UNSPECIFIED = 0;
  OPTION_TYPE_ENUM_CALL = 1;
  OPTION_TYPE_ENUM_PUT = 2;
}

message OptionContract {
  string symbol = 1;
  string expiry = 2;
  double strike = 3;
  OptionTypeEnum option_type = 4;
  string exchange = 5;
  string local_symbol = 6;
}

message BoxSpreadLeg {
  OptionContract long_call = 1;
  OptionContract short_call = 2;
  OptionContract long_put = 3;
  OptionContract short_put = 4;
  double net_debit = 5;
  double theoretical_value = 6;
  double arbitrage_profit = 7;
  double roi_percent = 8;
  double long_call_price = 9;
  double short_call_price = 10;
  double long_put_price = 11;
  double short_put_price = 12;
  double long_call_bid_ask_spread = 13;
  double short_call_bid_ask_spread = 14;
  double long_put_bid_ask_spread = 15;
  double short_put_bid_ask_spread = 16;
  double buy_net_debit = 17;
  double buy_profit = 18;
  double buy_implied_rate = 19;
  double sell_net_credit = 20;
  double sell_profit = 21;
  double sell_implied_rate = 22;
  double buy_sell_disparity = 23;
  double put_call_parity_violation = 24;
}

message BoxSpreadScenario {
  string symbol = 1;
  double strike_width = 2;
  double theoretical_value = 3;
  double estimated_net_debit = 4;
  double implied_apr = 5;
  string scenario_type = 6;
}

message BoxSpreadExecution {
  string symbol = 1;
  int32 lower_strike = 2;
  int32 upper_strike = 3;
  string expiry = 4;
  double net_debit = 5;
  string trade_id = 6;
  google.protobuf.Timestamp executed_at = 7;
}

// Yield curve: points per expiry for a given symbol/strike width.
message YieldCurvePoint {
  int32 days_to_expiry = 1;
  double implied_rate = 2;
  double effective_rate = 3;
  double net_debit = 4;
  double spread_bps = 5;
  google.protobuf.Timestamp as_of = 6;
}

message YieldCurve {
  string symbol = 1;
  double strike_width = 2;
  double benchmark_rate = 3;
  repeated YieldCurvePoint points = 4;
}

// Discovered opportunity (pre-trade) with confidence and execution metrics.
message BoxSpreadOpportunity {
  double spread = 1;
  double confidence_score = 2;
  double expected_profit = 3;
  double risk_adjusted_return = 4;
  double liquidity_score = 5;
  double execution_probability = 6;
  google.protobuf.Timestamp discovered_time = 7;
}

// Strategy filter and limit parameters (box spread / opportunity screening).
// Aligns with native/include/config_manager.h StrategyParams.
message StrategyParams {
  repeated string symbols = 1;
  int32 min_days_to_expiry = 2;
  int32 max_days_to_expiry = 3;
  double min_arbitrage_profit = 4;
  double min_roi_percent = 5;
  int32 max_positions = 6;
  double max_total_exposure = 7;
  double max_bid_ask_spread = 8;
  // Liquidity and sizing
  int32 min_volume = 9;
  int32 min_open_interest = 10;
  double max_position_size = 11;
  // Benchmark for rate comparison
  double benchmark_rate_percent = 12;
  string benchmark_source = 13;  // "static", "treasury_api", "sofr"
  string treasury_api_url = 14;
  double min_spread_over_benchmark_bps = 15;
}

// ---------------------------------------------------------------------------
// Discount Bank / Bank Account (ledger and services)
// ---------------------------------------------------------------------------

message BankAccount {
  string id = 1;
  string institution = 2;   // e.g. "discount_bank"
  string account_number = 3;
  string branch_number = 4;
  string section_number = 5;
  string currency = 6;
}

message DiscountBankBalance {
  BankAccount account = 1;
  double balance = 2;
  string currency = 3;
  google.protobuf.Timestamp balance_date = 4;
  double credit_rate = 5;    // e.g. 0.03 for 3%
  double debit_rate = 6;     // e.g. 0.103 for 10.3%
}

message DiscountBankTransaction {
  google.protobuf.Timestamp value_date = 1;
  double amount = 2;
  bool is_debit = 3;
  string reference = 4;
  string account_id = 5;
}

// ---------------------------------------------------------------------------
// Loans (synthetic loan positions / bank loans API)
// ---------------------------------------------------------------------------

enum LoanType {
  LOAN_TYPE_UNSPECIFIED = 0;
  LOAN_TYPE_SHIR_BASED = 1;
  LOAN_TYPE_CPI_LINKED = 2;
}

enum LoanStatus {
  LOAN_STATUS_UNSPECIFIED = 0;
  LOAN_STATUS_ACTIVE = 1;
  LOAN_STATUS_PAID_OFF = 2;
  LOAN_STATUS_DEFAULTED = 3;
}

message Loan {
  string loan_id = 1;
  string bank_name = 2;
  string account_number = 3;
  LoanType loan_type = 4;
  double principal = 5;
  double original_principal = 6;
  double interest_rate = 7;
  double spread = 8;
  double base_cpi = 9;
  double current_cpi = 10;
  string origination_date = 11;
  string maturity_date = 12;
  string next_payment_date = 13;
  double monthly_payment = 14;
  int32 payment_frequency_months = 15;
  LoanStatus status = 16;
  string last_update = 17;
}

// List response for GET /api/v1/loans with Accept: application/x-protobuf
message LoansResponse {
  repeated Loan loans = 1;
}

// ---------------------------------------------------------------------------
// Risk-Free Rate (extraction service / benchmark)
// ---------------------------------------------------------------------------

message RiskFreeRatePoint {
  int32 days_to_expiry = 1;
  double implied_rate_percent = 2;
  double liquidity_score = 3;
  google.protobuf.Timestamp as_of = 4;
  string symbol = 5;
}

message RiskFreeRateCurve {
  string symbol = 1;
  repeated RiskFreeRatePoint points = 2;
  google.protobuf.Timestamp timestamp = 3;
}
