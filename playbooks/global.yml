---
- name: Global developer environment setup
  hosts: localhost
  connection: local
  gather_facts: yes
  vars:
    brew_packages:
      - cmake
      - ninja
      - git
      - jq
      - python
      - shellcheck
      - shfmt
      - clang-format
    brew_casks:
      - iterm2
  roles:
    - role: common
      tags: ["global", "common"]
    - role: editor
      tags: ["global", "editor"]
      when: ansible_facts['os_family'] == 'Darwin'
    - role: langs
      tags: ["global", "langs"]
