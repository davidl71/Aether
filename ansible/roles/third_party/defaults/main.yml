---
repo_root: "{{ ansible_facts['env']['PWD'] }}"
fetch_components:
  - protobuf
  - intel
  - ibapi
third_party_root: "{{ repo_root }}/native/third_party"
third_party_cache: "{{ third_party_root }}/cache"
protobuf_version: "3.20.3"
protobuf_url_default: "https://github.com/protocolbuffers/protobuf/archive/refs/tags/v{{ protobuf_version }}.tar.gz"
protobuf_url: ""
intel_decimal_url: ""
intel_decimal_url_default: "https://www.netlib.org/misc/intel/IntelRDFPMathLib20U4.tar.gz"
ib_api_platform: "macunix"
ib_api_version: "1044.01"
ib_api_url_default: "https://interactivebrokers.github.io/downloads/twsapi_{{ ib_api_platform }}.{{ ib_api_version }}.zip"
ib_api_archive: ""
