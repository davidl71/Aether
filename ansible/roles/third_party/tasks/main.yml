---
- name: Ensure cache directory exists
  ansible.builtin.file:
    path: "{{ third_party_cache }}"
    state: directory
    mode: "0755"

- name: Ensure third_party root exists
  ansible.builtin.file:
    path: "{{ third_party_root }}"
    state: directory
    mode: "0755"

- name: Normalize fetch components list when provided as string
  ansible.builtin.set_fact:
    fetch_components_list: >-
      {{
        (
          fetch_components
          | default('')
          | replace('[', '')
          | replace(']', '')
          | replace('\"', '')
          | replace(\"'\", '')
          | replace(' ', '')
          | split(',')
        )
        | reject('equalto', '')
        | list
      }}
  when: fetch_components is string

- name: Normalize fetch components list when provided as list
  ansible.builtin.set_fact:
    fetch_components_list: "{{ fetch_components }}"
  when: fetch_components is not string

- name: Trim fetch components list
  ansible.builtin.set_fact:
    fetch_components_normalized: "{{ fetch_components_list | map('trim') | list }}"

- name: Fetch and extract protobuf
  when: "'protobuf' in fetch_components_normalized"
  block:
    - name: Resolve protobuf URL
      ansible.builtin.set_fact:
        protobuf_url_resolved: "{{ protobuf_url if protobuf_url | length > 0 else protobuf_url_default }}"

    - name: Download protobuf archive
      ansible.builtin.get_url:
        url: "{{ protobuf_url_resolved }}"
        dest: "{{ third_party_cache }}/protobuf-{{ protobuf_version }}.tar.gz"
        mode: "0644"

    - name: Ensure protobuf destination exists
      ansible.builtin.file:
        path: "{{ third_party_root }}/protobuf-{{ protobuf_version }}"
        state: directory
        mode: "0755"

    - name: Extract protobuf archive
      ansible.builtin.command:
        cmd: >-
          tar -xzf {{ third_party_cache }}/protobuf-{{ protobuf_version }}.tar.gz
          -C {{ third_party_root }}/protobuf-{{ protobuf_version }}
          --strip-components=1
        creates: "{{ third_party_root }}/protobuf-{{ protobuf_version }}/README.md"

- name: Handle Intel decimal math library
  when: "'intel' in fetch_components_normalized"
  block:
    - name: Search Downloads folder recursively for Intel decimal archive
      ansible.builtin.find:
        paths: "{{ ansible_facts['env']['HOME'] }}/Downloads"
        patterns:
          - "IntelRDFPMathLib*.tar.gz"
          - "intel*decimal*.tar.gz"
          - "*Intel*Decimal*.tar.gz"
          - "*Intel*RDFP*.tar.gz"
        recurse: true
        file_type: file
      register: intel_downloads_search
      when: intel_decimal_url | length == 0

    - name: Debug Intel decimal search results
      ansible.builtin.debug:
        msg: "Found {{ intel_downloads_search.files | length }} Intel decimal archive(s) in Downloads: {{ intel_downloads_search.files | map(attribute='path') | list }}"
      when:
        - intel_decimal_url | length == 0
        - intel_downloads_search.files | length > 0

    - name: Set Intel decimal URL from Downloads if found (most recent)
      ansible.builtin.set_fact:
        intel_decimal_url: "{{ intel_downloads_search.files | sort(attribute='mtime', reverse=true) | map(attribute='path') | list | first }}"
      when:
        - intel_decimal_url | length == 0
        - intel_downloads_search.files | length > 0

    - name: Warn when Intel decimal URL not provided (before Netlib fallback)
      ansible.builtin.debug:
        msg: >
          INTEL_DECIMAL_URL not set and no archive found in Downloads (searched recursively for:
          IntelRDFPMathLib*.tar.gz, intel*decimal*.tar.gz, *Intel*Decimal*.tar.gz, *Intel*RDFP*.tar.gz).

          Options:
          1. Place the archive in Downloads folder (any subdirectory) - will be auto-detected
          2. Place manually at {{ third_party_cache }}/IntelRDFPMathLib20U4.tar.gz
          3. Provide URL via INTEL_DECIMAL_URL environment variable
          4. Download from Netlib: {{ intel_decimal_url_default }}

          Falling back to Netlib download...
      when: intel_decimal_url | length == 0

    - name: Set Intel decimal URL to Netlib default if not found
      ansible.builtin.set_fact:
        intel_decimal_url: "{{ intel_decimal_url_default }}"
      when: intel_decimal_url | length == 0

    - name: Download Intel decimal archive
      ansible.builtin.get_url:
        url: "{{ intel_decimal_url }}"
        dest: "{{ third_party_cache }}/IntelRDFPMathLib20U4.tar.gz"
        mode: "0644"
      when:
        - intel_decimal_url | length > 0
        - (intel_decimal_url | lower | regex_search('^[a-z]+://')) is not none

    - name: Copy Intel decimal archive from local path
      ansible.builtin.copy:
        src: "{{ intel_decimal_url }}"
        dest: "{{ third_party_cache }}/IntelRDFPMathLib20U4.tar.gz"
        mode: "0644"
      when:
        - intel_decimal_url | length > 0
        - (intel_decimal_url | lower | regex_search('^[a-z]+://')) is none

    - name: Stat Intel decimal archive
      ansible.builtin.stat:
        path: "{{ third_party_cache }}/IntelRDFPMathLib20U4.tar.gz"
      register: intel_decimal_archive

    - name: Ensure Intel decimal destination exists
      ansible.builtin.file:
        path: "{{ third_party_root }}/IntelRDFPMathLib20U4"
        state: directory
        mode: "0755"
      when: intel_decimal_archive.stat.exists

    - name: Extract Intel decimal archive when available
      ansible.builtin.command:
        cmd: >-
          tar -xzf {{ third_party_cache }}/IntelRDFPMathLib20U4.tar.gz
          -C {{ third_party_root }}/IntelRDFPMathLib20U4 --strip-components=1
        creates: "{{ third_party_root }}/IntelRDFPMathLib20U4/README"
      when: intel_decimal_archive.stat.exists

- name: Handle IB API archive
  when: "'ibapi' in fetch_components_normalized"
  block:
    - name: Search Downloads folder recursively for TWS API archive
      ansible.builtin.find:
        paths: "{{ ansible_facts['env']['HOME'] }}/Downloads"
        patterns:
          - "twsapi*.zip"
        recurse: true
        file_type: file
      register: ibapi_downloads_search
      when: ib_api_archive | length == 0

    - name: Set IB API archive from Downloads if found (most recent)
      ansible.builtin.set_fact:
        ib_api_archive: "{{ ibapi_downloads_search.files | sort(attribute='mtime', reverse=true) | map(attribute='path') | list | first }}"
      when:
        - ib_api_archive | length == 0
        - ibapi_downloads_search.files | length > 0

    - name: Determine IB API source
      ansible.builtin.set_fact:
        ib_api_source: "{{ ib_api_archive if ib_api_archive | length > 0 else ib_api_url_default }}"
        ib_api_using_default: "{{ ib_api_archive | length == 0 }}"

    - name: Announce IB API default download
      ansible.builtin.debug:
        msg: "IB_API_ARCHIVE not provided and not found in Downloads. Falling back to default SDK URL: {{ ib_api_source }}"
      when: ib_api_using_default

    - name: Determine if IB API source appears to be a URL
      ansible.builtin.set_fact:
        ib_api_source_is_url: "{{ (ib_api_source | lower | regex_search('^[a-z]+://')) is not none }}"

    - name: Stat IB API source when local path
      ansible.builtin.stat:
        path: "{{ ib_api_source }}"
      register: ib_api_local
      when: not ib_api_source_is_url

    - name: Fail when IB API archive path does not exist
      ansible.builtin.fail:
        msg: "IB API archive path not found: {{ ib_api_source }}"
      when:
        - not ib_api_source_is_url
        - not ib_api_local.stat.exists

    - name: Compute IB API archive filename
      ansible.builtin.set_fact:
        ib_api_archive_filename: "{{ ib_api_source | basename }}"

    - name: Ensure TWS API directory exists
      ansible.builtin.file:
        path: "{{ third_party_root }}/tws-api"
        state: directory
        mode: "0755"

    - name: Copy IB API archive to cache
      ansible.builtin.copy:
        src: "{{ ib_api_source }}"
        dest: "{{ third_party_cache }}/{{ ib_api_archive_filename }}"
        mode: "0644"
      when:
        - not ib_api_source_is_url

    - name: Download IB API archive
      ansible.builtin.get_url:
        url: "{{ ib_api_source }}"
        dest: "{{ third_party_cache }}/{{ ib_api_archive_filename }}"
        mode: "0644"
      when: ib_api_source_is_url

    - name: Extract IB API archive
      ansible.builtin.unarchive:
        src: "{{ third_party_cache }}/{{ ib_api_archive_filename }}"
        dest: "{{ third_party_root }}/tws-api"
        remote_src: true
        creates: "{{ third_party_root }}/tws-api/IBJts"
