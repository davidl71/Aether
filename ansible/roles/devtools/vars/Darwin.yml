---
# macOS (Homebrew) package list for devtools role
# macOS uses system keychain for SSL; no update-ca-certificates step (exarp-go pattern).
_ca_bundle_path: /etc/ssl/cert.pem
_devtools_packages:
  - jq
  - go
  - python
  - curl
  - bash
  - act
  - uv
  - just
  - fswatch
  - git-lfs
  # C++ build and native CLI
  - cmake
  - ninja
  - boost
  - protobuf
  - abseil
  # Compiler cache: C++ and Rust (workspace rustc-wrapper uses sccache when present)
  - ccache
  - sccache
  # Pre-commit / lint (matches .pre-commit-config.yaml)
  - shellcheck
  - cppcheck
  - markdownlint-cli
  # SQLite CLI and libs (exarp-go, MCP, local DBs)
  - sqlite
  # Optional: docs (BUILD_DOCS=ON) and NATS (ENABLE_NATS=ON)
  - doxygen
  - nats-server
  # Java (IB Client Portal Gateway on port 5000)
  - openjdk@11
  # Rust toolchain (agents/, Rust backends)
  - rust
