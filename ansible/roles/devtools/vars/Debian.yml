---
# Debian/Ubuntu (apt) package list for devtools role
_ca_bundle_path: /etc/ssl/certs/ca-certificates.crt
# buf: version for GitHub release binary (proto codegen)
_buf_version: "1.66.0"
_devtools_packages:
  - ca-certificates
  - python3
  - python3-pip
  - python3-venv
  - python3-dev
  - jq
  - bash
  - build-essential
  - cmake
  - ninja-build
  - pkg-config
  - curl
  - inotify-tools
  - git-lfs
  # C++ build dependencies
  - libboost-all-dev
  - libprotobuf-dev
  - protobuf-compiler
  - libabsl-dev
  - libblas-dev
  - liblapack-dev
  # libcurl for native HTTP client (find_package(CURL))
  - libcurl4-openssl-dev
  # Compiler cache for faster rebuilds (scripts/build_fast.sh)
  - ccache
  # Pre-commit / lint: shellcheck, markdownlint (Ruby gem for pre-commit)
  - shellcheck
  - cppcheck
  - ruby
  - ruby-dev
  # SQLite CLI and dev headers (exarp-go, MCP, local DBs)
  - sqlite3
  - libsqlite3-dev
  # Optional: docs (BUILD_DOCS=ON) and NATS (ENABLE_NATS=ON)
  - doxygen
  - nats-server
  # Java (IB Client Portal Gateway on port 5000)
  - openjdk-11-jdk
  # Rust toolchain (agents/, Rust backends) + just (command runner via cargo)
  - cargo
  - rustc
  # Node.js ecosystem (nvm installed separately in tasks; this ensures build tools)
  - nodejs
  - npm
