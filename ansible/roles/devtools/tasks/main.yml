- name: Ensure required packages on Debian/Ubuntu
  become: true
  apt:
    name:
      - python3
      - python3-pip
      - python3-venv
      - jq
      - build-essential
      - cmake
      - ninja-build
      - libboost-all-dev
      - curl
      - inotify-tools
      - git-lfs
    state: present
    update_cache: true
  when: ansible_facts['os_family'] == 'Debian'

- name: Ensure Homebrew packages on macOS
  become: false
  community.general.homebrew:
    name:
      - jq
      - go
      - python
      - poetry
      - curl
      - act
      - uv
      - fswatch
      - git-lfs
    state: present
  when: ansible_facts['os_family'] == 'Darwin'

- name: Install act on Debian/Ubuntu
  become: true
  block:
    - name: Download act binary
      get_url:
        url: https://github.com/nektos/act/releases/download/v0.2.82/act_Linux_x86_64.tar.gz
        dest: /tmp/act.tar.gz
        mode: "0644"
    - name: Extract act binary
      unarchive:
        src: /tmp/act.tar.gz
        dest: /usr/local/bin
        remote_src: true
        creates: /usr/local/bin/act
    - name: Ensure act binary permissions
      file:
        path: /usr/local/bin/act
        mode: "0755"
    - name: Clean act archive
      file:
        path: /tmp/act.tar.gz
        state: absent
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_architecture == 'x86_64'
    - ansible_env.SUDO_USER is defined

- name: Install Poetry via pip
  become: false
  ansible.builtin.command: >-
    python3 -m pip install --user --upgrade poetry
  register: poetry_install
  changed_when: "'Requirement already satisfied' not in poetry_install.stdout"
  when: ansible_facts['os_family'] == 'Debian'

- name: Install uvx via pip (macOS)
  become: false
  ansible.builtin.command: >-
    python3 -m pip install --user --upgrade uvx
  register: uvx_install_macos
  changed_when: "'Requirement already satisfied' not in uvx_install_macos.stdout"
  when: ansible_facts['os_family'] == 'Darwin'

- name: Install uvx via pip (Debian/Ubuntu)
  become: false
  ansible.builtin.command: >-
    python3 -m pip install --user --upgrade uvx
  register: uvx_install_debian
  changed_when: "'Requirement already satisfied' not in uvx_install_debian.stdout"
  when: ansible_facts['os_family'] == 'Debian'

- name: Verify uvx installation
  become: false
  ansible.builtin.command: >-
    uvx --version
  register: uvx_version
  changed_when: false
  failed_when: false
  when: ansible_facts['os_family'] in ['Debian', 'Darwin']

- name: Display uvx version
  ansible.builtin.debug:
    msg: "uvx version: {{ uvx_version.stdout }}"
  when:
    - ansible_facts['os_family'] in ['Debian', 'Darwin']
    - uvx_version.rc == 0

# ---------------------------------------------------------------------------
# MLX / MLX-LM (Apple Silicon only)
# ---------------------------------------------------------------------------
- name: Install MLX and MLX-LM (Apple Silicon/macOS) via pip
  become: false
  ansible.builtin.command: >-
    python3 -m pip install --user --upgrade mlx mlx-lm
  register: mlx_install_result
  changed_when: "'Successfully installed' in mlx_install_result.stdout or 'Installing collected packages' in mlx_install_result.stdout or 'Requirement already satisfied' not in mlx_install_result.stdout"
  when:
    - ansible_facts['os_family'] == 'Darwin'
    - ansible_facts['architecture'] is defined
    - ansible_facts['architecture'] in ['arm64', 'aarch64']

- name: Verify MLX install (Apple Silicon/macOS)
  become: false
  ansible.builtin.command: >-
    python3 - << 'PY'
    import sys
    try:
        import mlx  # noqa: F401
        import mlx_lm  # noqa: F401
        print('OK')
    except Exception as e:
        print(f'ERR: {e}', file=sys.stderr)
        sys.exit(1)
    PY
  register: mlx_verify
  changed_when: false
  failed_when: mlx_verify.rc != 0
  when:
    - ansible_facts['os_family'] == 'Darwin'
    - ansible_facts['architecture'] is defined
    - ansible_facts['architecture'] in ['arm64', 'aarch64']

- name: Display MLX verification result
  ansible.builtin.debug:
    msg: "MLX verification: {{ mlx_verify.stdout | default('skipped') }}"
  when:
    - ansible_facts['os_family'] == 'Darwin'
    - ansible_facts['architecture'] is defined
    - ansible_facts['architecture'] in ['arm64', 'aarch64']

- name: Determine nvm profile path
  set_fact:
    nvm_profile: "{{ ansible_env.HOME }}/.zshrc"
  when: ansible_facts['os_family'] == 'Darwin'

- name: Fallback nvm profile path
  set_fact:
    nvm_profile: "{{ ansible_env.HOME }}/.bashrc"
  when: nvm_profile is not defined

- name: Ensure nvm directory exists
  file:
    path: "{{ ansible_env.HOME }}/.nvm"
    state: directory
    mode: "0755"

- name: Ensure nvm is installed
  shell: |
    export PROFILE="{{ nvm_profile }}"
    curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
  args:
    creates: "{{ ansible_env.HOME }}/.nvm/nvm.sh"
  when: ansible_facts['os_family'] in ['Debian', 'Darwin']

- name: Install Node.js 20 via nvm when available
  shell: |
    export NVM_DIR="$HOME/.nvm"
    [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
    nvm install --lts
  args:
    creates: "$HOME/.nvm/versions/node"
  when: ansible_facts['os_family'] in ['Debian', 'Darwin']

- name: Install Go 1.21 via tarball on Debian/Ubuntu
  become: true
  get_url:
    url: https://go.dev/dl/go1.21.6.linux-amd64.tar.gz
    dest: /tmp/go.tar.gz
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_architecture == 'x86_64'

- name: Extract Go tarball
  become: true
  unarchive:
    src: /tmp/go.tar.gz
    dest: /usr/local
    remote_src: true
    creates: /usr/local/go/bin/go
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_architecture == 'x86_64'

- name: Clean Go tarball
  file:
    path: /tmp/go.tar.gz
    state: absent
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_architecture == 'x86_64'

# ---------------------------------------------------------------------------
# Git LFS Setup
# ---------------------------------------------------------------------------
- name: Initialize Git LFS (macOS)
  become: false
  ansible.builtin.command: git lfs install
  register: git_lfs_init_macos
  changed_when: "'Git LFS initialized' in git_lfs_init_macos.stdout or 'Updated Git hooks' in git_lfs_init_macos.stdout"
  when: ansible_facts['os_family'] == 'Darwin'

- name: Initialize Git LFS (Debian/Ubuntu)
  become: false
  ansible.builtin.command: git lfs install
  register: git_lfs_init_debian
  changed_when: "'Git LFS initialized' in git_lfs_init_debian.stdout or 'Updated Git hooks' in git_lfs_init_debian.stdout"
  when: ansible_facts['os_family'] == 'Debian'

- name: Verify Git LFS installation
  become: false
  ansible.builtin.command: git lfs version
  register: git_lfs_version
  changed_when: false
  failed_when: git_lfs_version.rc != 0
  when: ansible_facts['os_family'] in ['Debian', 'Darwin']

- name: Display Git LFS version
  ansible.builtin.debug:
    msg: "Git LFS version: {{ git_lfs_version.stdout }}"
  when:
    - ansible_facts['os_family'] in ['Debian', 'Darwin']
    - git_lfs_version.rc == 0
