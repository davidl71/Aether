- name: Load OS-specific variables
  ansible.builtin.include_vars: "{{ ansible_os_family }}.yml"
  tags: [devtools, packages]

- name: Ensure required packages on Debian/Ubuntu
  become: true
  ansible.builtin.apt:
    name: "{{ _devtools_packages }}"
    state: present
    update_cache: true
  when: ansible_facts['os_family'] == 'Debian'
  tags: [devtools, packages]

# --- CA certificates (exarp-go pattern: update trust store, verify bundle) ---
- name: Update CA trust store (Debian/Ubuntu)
  ansible.builtin.command: update-ca-certificates
  register: ca_update_debian
  changed_when: "'0 added' not in (ca_update_debian.stdout | default(''))"
  when: ansible_facts['os_family'] == 'Debian'
  tags: [devtools, security]

- name: Verify CA certificate bundle exists (Debian)
  ansible.builtin.stat:
    path: "{{ _ca_bundle_path }}"
  register: ca_bundle
  when: ansible_facts['os_family'] == 'Debian'
  tags: [devtools, security]

- name: Display CA certificate status
  ansible.builtin.debug:
    msg: "Mozilla CA certificates: {{ '✅ Installed' if ca_bundle.stat.exists | default(false) else '❌ Not found' }} ({{ _ca_bundle_path }})"
  when: ansible_facts['os_family'] == 'Debian'
  tags: [devtools, security]

- name: Install markdownlint gem (Debian, for pre-commit)
  become: false
  ansible.builtin.command: gem install markdownlint
  register: markdownlint_gem
  changed_when: "'1 gem installed' in markdownlint_gem.stdout or 'Successfully installed' in markdownlint_gem.stdout"
  failed_when: false
  when: ansible_facts['os_family'] == 'Debian'

- name: Ensure Homebrew packages on macOS
  become: false
  community.general.homebrew:
    name: "{{ _devtools_packages }}"
    state: present
  when: ansible_facts['os_family'] == 'Darwin'
  tags: [devtools, packages]

# ---------------------------------------------------------------------------
# Nix (dev shell: flake.nix, USE_NIX=1, just nix <recipe>)
# ---------------------------------------------------------------------------
- name: Check if Nix is already installed
  become: false
  ansible.builtin.stat:
    path: "{{ item }}"
  register: nix_install_check
  loop:
    - /nix/store
    - "{{ ansible_facts.env.HOME }}/.nix-profile"
  failed_when: false

- name: Install Nix (macOS, multi-user recommended)
  become: false
  ansible.builtin.shell: |
    set -e
    curl -LsSf https://nixos.org/nix/install | sh
  args:
    executable: /bin/bash
  environment:
    HOME: "{{ ansible_facts.env.HOME }}"
  register: nix_install_macos
  changed_when: nix_install_macos.rc == 0
  # Note: First run may prompt for confirmation; re-run playbook if skipped.
  when:
    - ansible_facts['os_family'] == 'Darwin'
    - not (nix_install_check.results[0].stat.exists | default(false) or nix_install_check.results[1].stat.exists | default(false))

- name: Install Nix (Debian/Ubuntu, single-user when not root)
  become: false
  ansible.builtin.shell: |
    set -e
    curl -LsSf https://nixos.org/nix/install | sh -s -- --no-daemon
  args:
    executable: /bin/bash
  environment:
    HOME: "{{ ansible_facts.env.HOME }}"
  register: nix_install_debian
  changed_when: nix_install_debian.rc == 0
  when:
    - ansible_facts['os_family'] == 'Debian'
    - not (nix_install_check.results[0].stat.exists | default(false) or nix_install_check.results[1].stat.exists | default(false))

- name: Ensure Nix config directory exists
  become: false
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.config/nix"
    state: directory
    mode: "0755"

- name: Enable Nix flakes and nix-command in user config
  become: false
  ansible.builtin.lineinfile:
    path: "{{ ansible_facts.env.HOME }}/.config/nix/nix.conf"
    line: "experimental-features = nix-command flakes"
    create: true
    mode: "0644"

- name: Add NATS Homebrew tap (macOS) for nats CLI
  community.general.homebrew_tap:
    name: nats-io/nats-tools
    state: present
  when: ansible_facts['os_family'] == 'Darwin'

- name: Install NATS CLI from tap (macOS)
  community.general.homebrew:
    name: nats-io/nats-tools/nats
    state: present
  when: ansible_facts['os_family'] == 'Darwin'

- name: Install uv on Debian/Ubuntu
  become: false
  ansible.builtin.shell: |
    if ! command -v uv >/dev/null 2>&1; then
      curl -LsSf https://astral.sh/uv/install.sh | sh
    fi
  args:
    executable: /bin/bash
  register: uv_install_debian
  changed_when: "'installed' in uv_install_debian.stdout"
  when: ansible_facts['os_family'] == 'Debian'

- name: Install act on Debian/Ubuntu
  become: true
  block:
    - name: Download act binary
      get_url:
        url: https://github.com/nektos/act/releases/download/v0.2.82/act_Linux_x86_64.tar.gz
        dest: /tmp/act.tar.gz
        mode: "0644"
    - name: Extract act binary
      unarchive:
        src: /tmp/act.tar.gz
        dest: /usr/local/bin
        remote_src: true
        creates: /usr/local/bin/act
    - name: Ensure act binary permissions
      file:
        path: /usr/local/bin/act
        mode: "0755"
    - name: Clean act archive
      file:
        path: /tmp/act.tar.gz
        state: absent
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_architecture == 'x86_64'
    - ansible_env.SUDO_USER is defined

- name: Install Poetry via uv
  become: false
  ansible.builtin.command: uv tool install poetry
  register: poetry_install
  changed_when: "'Installed' in poetry_install.stdout"
  failed_when: false
  when: ansible_facts['os_family'] == 'Debian'

- name: Install pip-audit via uv (Python dependency vulnerability scanner)
  become: false
  ansible.builtin.command: uv tool install pip-audit
  register: pip_audit_install
  changed_when: "'Installed' in pip_audit_install.stdout"
  failed_when: false

- name: Verify pip-audit installation
  become: false
  ansible.builtin.command: pip-audit --version
  register: pip_audit_version
  changed_when: false
  failed_when: false
  environment:
    PATH: "{{ ansible_facts.env.HOME }}/.local/bin:{{ ansible_facts.env.PATH }}"

- name: Display pip-audit version
  ansible.builtin.debug:
    msg: "pip-audit: {{ pip_audit_version.stdout | default('(install with: uv tool install pip-audit)') }}"
  when: pip_audit_version.rc == 0

- name: Install cmakelang via uv (cmake-lint for CMakeLists.txt linting)
  become: false
  ansible.builtin.command: uv tool install cmakelang
  register: cmakelang_install
  changed_when: "'Installed' in cmakelang_install.stdout"
  failed_when: false

- name: Verify cmake-lint installation
  become: false
  ansible.builtin.command: cmake-lint --version
  register: cmake_lint_version
  changed_when: false
  failed_when: false
  environment:
    PATH: "{{ ansible_facts.env.HOME }}/.local/bin:{{ ansible_facts.env.PATH }}"

- name: Display cmake-lint version
  ansible.builtin.debug:
    msg: "cmake-lint: {{ cmake_lint_version.stdout | default('(install with: uv tool install cmakelang)') }}"
  when: cmake_lint_version.rc == 0

- name: Ensure shell config has uv tool path (run uv tool update-shell)
  become: false
  ansible.builtin.command: uv tool update-shell
  register: uv_update_shell
  changed_when: "'Created' in uv_update_shell.stdout or 'Updated' in uv_update_shell.stdout or 'Modified' in uv_update_shell.stdout"
  failed_when: false

- name: Notify to restart shell for uv tools on PATH
  ansible.builtin.debug:
    msg: "Restart your shell or run 'source ~/.zshenv' so uv tools (cmake-lint, pip-audit, etc.) are on PATH"
  when: uv_update_shell.rc == 0

- name: Verify uv installation
  become: false
  ansible.builtin.command: uv --version
  register: uv_version
  changed_when: false
  failed_when: false

- name: Display uv version
  ansible.builtin.debug:
    msg: "uv version: {{ uv_version.stdout }}"
  when: uv_version.rc == 0

# ---------------------------------------------------------------------------
# MLX / MLX-LM (Apple Silicon only) -- installed via uv
# ---------------------------------------------------------------------------
- name: Install MLX and MLX-LM (Apple Silicon/macOS) via uv
  become: false
  ansible.builtin.command: uv pip install --system mlx mlx-lm
  register: mlx_install_result
  changed_when: "'Installed' in mlx_install_result.stdout or 'installed' in mlx_install_result.stdout"
  failed_when: false
  when:
    - ansible_facts['os_family'] == 'Darwin'
    - ansible_facts['architecture'] is defined
    - ansible_facts['architecture'] in ['arm64', 'aarch64']

- name: Verify MLX install (Apple Silicon/macOS)
  become: false
  ansible.builtin.command: >-
    python3 - << 'PY'
    import sys
    try:
        import mlx  # noqa: F401
        import mlx_lm  # noqa: F401
        print('OK')
    except Exception as e:
        print(f'ERR: {e}', file=sys.stderr)
        sys.exit(1)
    PY
  register: mlx_verify
  changed_when: false
  failed_when: mlx_verify.rc != 0
  when:
    - ansible_facts['os_family'] == 'Darwin'
    - ansible_facts['architecture'] is defined
    - ansible_facts['architecture'] in ['arm64', 'aarch64']

- name: Display MLX verification result
  ansible.builtin.debug:
    msg: "MLX verification: {{ mlx_verify.stdout | default('skipped') }}"
  when:
    - ansible_facts['os_family'] == 'Darwin'
    - ansible_facts['architecture'] is defined
    - ansible_facts['architecture'] in ['arm64', 'aarch64']

- name: Determine nvm profile path
  set_fact:
    nvm_profile: "{{ ansible_facts.env.HOME }}/.zshrc"
  when: ansible_facts['os_family'] == 'Darwin'

- name: Fallback nvm profile path
  set_fact:
    nvm_profile: "{{ ansible_facts.env.HOME }}/.bashrc"
  when: nvm_profile is not defined

- name: Ensure nvm directory exists
  file:
    path: "{{ ansible_facts.env.HOME }}/.nvm"
    state: directory
    mode: "0755"

- name: Ensure nvm is installed
  shell: |
    export PROFILE="{{ nvm_profile }}"
    curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
  args:
    creates: "{{ ansible_facts.env.HOME }}/.nvm/nvm.sh"
  when: ansible_facts['os_family'] in ['Debian', 'Darwin']

- name: Install Node.js LTS via nvm when available
  shell: |
    export NVM_DIR="$HOME/.nvm"
    [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
    nvm install --lts
  args:
    creates: "$HOME/.nvm/versions/node"
  when: ansible_facts['os_family'] in ['Debian', 'Darwin']

- name: Install Go 1.21 via tarball on Debian/Ubuntu
  become: true
  get_url:
    url: https://go.dev/dl/go1.21.6.linux-amd64.tar.gz
    dest: /tmp/go.tar.gz
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_architecture == 'x86_64'

- name: Extract Go tarball
  become: true
  unarchive:
    src: /tmp/go.tar.gz
    dest: /usr/local
    remote_src: true
    creates: /usr/local/go/bin/go
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_architecture == 'x86_64'

- name: Clean Go tarball
  file:
    path: /tmp/go.tar.gz
    state: absent
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_architecture == 'x86_64'

# ---------------------------------------------------------------------------
# Git LFS Setup
# ---------------------------------------------------------------------------
- name: Initialize Git LFS (macOS)
  become: false
  ansible.builtin.command: git lfs install
  register: git_lfs_init_macos
  changed_when: "'Git LFS initialized' in git_lfs_init_macos.stdout or 'Updated Git hooks' in git_lfs_init_macos.stdout"
  when: ansible_facts['os_family'] == 'Darwin'

- name: Initialize Git LFS (Debian/Ubuntu)
  become: false
  ansible.builtin.command: git lfs install
  register: git_lfs_init_debian
  changed_when: "'Git LFS initialized' in git_lfs_init_debian.stdout or 'Updated Git hooks' in git_lfs_init_debian.stdout"
  when: ansible_facts['os_family'] == 'Debian'

- name: Verify Git LFS installation
  become: false
  ansible.builtin.command: git lfs version
  register: git_lfs_version
  changed_when: false
  failed_when: git_lfs_version.rc != 0
  when: ansible_facts['os_family'] in ['Debian', 'Darwin']

- name: Display Git LFS version
  ansible.builtin.debug:
    msg: "Git LFS version: {{ git_lfs_version.stdout }}"
  when:
    - ansible_facts['os_family'] in ['Debian', 'Darwin']
    - git_lfs_version.rc == 0
