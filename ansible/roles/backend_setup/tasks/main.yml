---
- name: Set backend directory fact
  ansible.builtin.set_fact:
    backend_dir: "{{ repo_root }}/agents/backend"

- name: Ensure backend virtualenv exists and pip is current
  ansible.builtin.pip:
    name: pip
    state: latest
    virtualenv: "{{ backend_dir }}/.venv"
    virtualenv_python: "{{ python_bin }}"

- name: Install backend Python package in editable mode
  ansible.builtin.pip:
    name: "{{ backend_dir }}/python"
    editable: true
    virtualenv: "{{ backend_dir }}/.venv"

- name: Install Nautilus Trader wheel when provided
  ansible.builtin.pip:
    name: "{{ nautilus_trader_wheel }}"
    virtualenv: "{{ backend_dir }}/.venv"
  when: nautilus_trader_wheel | length > 0

- name: Fetch Rust dependencies
  ansible.builtin.command: cargo fetch --manifest-path "{{ backend_dir }}/Cargo.toml"
  args:
    chdir: "{{ backend_dir }}"

