version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(ci)"
    labels:
      - "dependencies"
      - "ci"

  - package-ecosystem: "pip"
    directory: "/python"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(python)"
    labels:
      - "dependencies"
      - "python"

  - package-ecosystem: "pip"
    directory: "/agents/backend/python"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "deps(agents-python)"
    labels:
      - "dependencies"
      - "python"
      - "agents"

  - package-ecosystem: "cargo"
    directory: "/agents/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(rust)"
    labels:
      - "dependencies"
      - "rust"
      - "agents"

  - package-ecosystem: "gomod"
    directory: "/agents/go"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "deps(go)"
    labels:
      - "dependencies"
      - "go"
      - "agents"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "deps(node)"
    labels:
      - "dependencies"
      - "node"

  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(web)"
    labels:
      - "dependencies"
      - "node"
      - "web"

  - package-ecosystem: "npm"
    directory: "/cursor-extension"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "deps(cursor-extension)"
    labels:
      - "dependencies"
      - "node"
      - "tooling"

  - package-ecosystem: "npm"
    directory: "/tui-e2e"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "deps(tui-e2e)"
    labels:
      - "dependencies"
      - "node"
      - "tui"

  - package-ecosystem: "npm"
    directory: "/services/israeli-bank-scrapers-service"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "deps(scrapers)"
    labels:
      - "dependencies"
      - "node"
      - "services"
