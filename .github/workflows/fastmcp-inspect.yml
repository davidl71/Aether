name: FastMCP Inspect

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install FastMCP CLI
        run: |
          pip install fastmcp

      - name: Inspect FastMCP configuration
        run: |
          fastmcp inspect fastmcp.json || echo "No fastmcp.json or inspection completed with warnings"
