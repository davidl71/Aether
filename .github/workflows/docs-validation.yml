# Documentation Validation
# Format validation: use exarp-go MCP (`health` with `action=docs`) or exarp-go CLI.
# This workflow runs blocking link validation and markdownlint checks.

name: Documentation Validation

on:
  pull_request:
    paths:
      - 'docs/API_DOCUMENTATION_INDEX.md'
      - 'docs/**/*.md'
      - 'scripts/validate_docs_*.sh'
  push:
    branches:
      - main
    paths:
      - 'docs/API_DOCUMENTATION_INDEX.md'
      - 'docs/**/*.md'

jobs:
  validate-markdownlint:
    name: Validate Markdown Format (markdownlint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint markdown files
        run: npm run lint:docs:ci
        # Strict mode: Fail CI on markdown format errors

  validate-links:
    name: Validate Documentation Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Links
        run: |
          chmod +x scripts/validate_docs_links.sh
          ./scripts/validate_docs_links.sh
