name: Agents Backend Rust

on:
  push:
    branches: [main, develop]
    paths:
      - "agents/backend/**"
      - ".github/workflows/agents-backend-rust.yml"
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install sccache
        id: install_sccache
        run: cargo install sccache --locked
        continue-on-error: true

      - name: Set up sccache for Rust
        if: steps.install_sccache.outcome == 'success'
        run: |
          mkdir -p ~/.cache/sccache
          echo "SCCACHE_DIR=$HOME/.cache/sccache" >> "$GITHUB_ENV"

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            agents/backend/target
          key: ${{ runner.os }}-agents-backend-cargo-${{ hashFiles('agents/backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-agents-backend-cargo-

      - name: Resolve Python for PyO3
        run: echo "PYO3_PYTHON=$(python -c 'import sys; print(sys.executable)')" >> "$GITHUB_ENV"

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit

  security-audit:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: agents/backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit (fail on high/critical)
        run: cargo audit --deny warnings
        continue-on-error: true
        id: audit

      - name: Create issue on vulnerability found
        if: steps.audit.outcome == 'failure' && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Security vulnerabilities detected in dependencies`,
              body: `Automated security audit detected high/critical severity vulnerabilities.\n\nRun \`cargo audit\` locally to see details.`,
              labels: ['security', 'dependencies', 'automated']
            });
            console.log('Created issue:', issue.data.html_url);

      - name: Fail workflow on audit failure
        if: steps.audit.outcome == 'failure'
        run: exit 1

      # Trim target/ before saving cache (keeps cache smaller; sweep removes artifacts older than 0 days)
      - name: Install cargo-sweep
        run: cargo install cargo-sweep

      - name: Sweep old target artifacts (trim cache)
        run: cargo sweep --time 0 .
