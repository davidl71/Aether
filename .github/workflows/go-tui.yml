name: Go TUI CI

on:
  push:
    paths:
      - 'tui/**'
      - '.github/workflows/go-tui.yml'
  pull_request:
    paths:
      - 'tui/**'
      - '.github/workflows/go-tui.yml'

jobs:
  lint:
    runs-on: macos-latest
    env:
      GOCACHE: ${{ github.workspace }}/.cache/go-build
      GOMODCACHE: ${{ github.workspace }}/.cache/go-mod
    steps:
      - uses: actions/checkout@v4

      - id: setup-go
        uses: actions/setup-go@v5
        with:
          go-version-file: tui/go.mod

      - name: Cache Go modules and build outputs
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.GOCACHE }}
            ${{ env.GOMODCACHE }}
          key: go-${{ runner.os }}-${{ hashFiles('tui/go.sum') }}-${{ steps.setup-go.outputs.go-version }}
          restore-keys: |
            go-${{ runner.os }}-${{ hashFiles('tui/go.sum') }}-
            go-${{ runner.os }}-

      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.59.0

      - name: Run go vet
        working-directory: tui
        run: go vet ./...

      - name: Run golangci-lint
        working-directory: tui
        run: $(go env GOPATH)/bin/golangci-lint run ./...

  build-tui:
    runs-on: macos-latest
    needs: lint
    env:
      GOCACHE: ${{ github.workspace }}/.cache/go-build
      GOMODCACHE: ${{ github.workspace }}/.cache/go-mod
    steps:
      - uses: actions/checkout@v4

      - id: setup-go
        uses: actions/setup-go@v5
        with:
          go-version-file: tui/go.mod

      - name: Cache Go modules and build outputs
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.GOCACHE }}
            ${{ env.GOMODCACHE }}
          key: go-${{ runner.os }}-${{ hashFiles('tui/go.sum') }}-${{ steps.setup-go.outputs.go-version }}
          restore-keys: |
            go-${{ runner.os }}-${{ hashFiles('tui/go.sum') }}-
            go-${{ runner.os }}-

      - name: Run go test
        working-directory: tui
        run: go test ./...

      - name: Build TUI binary
        working-directory: tui
        run: go build -o dist/ib-box-spread-tui ./cmd/tui
