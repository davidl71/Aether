name: Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync Python dependencies
        run: uv sync --project python --extra dev

      - name: Install lint tools
        run: uv tool install black ruff mypy

      - name: Run Black (format check)
        run: uvx black --check python/ scripts/

      - name: Run Ruff (linting)
        run: uvx ruff check python/ scripts/

      - name: Run MyPy (type checking)
        run: uvx mypy python/ scripts/ --ignore-missing-imports

      - name: Run exarp-go lint (optional)
        id: exarp
        continue-on-error: true
        run: |
          export PATH="${HOME}/go/bin:${PATH}"
          ./scripts/run_exarp_go_tool.sh lint || echo "exarp-go lint skipped or had findings (install exarp-go for full coverage)"
