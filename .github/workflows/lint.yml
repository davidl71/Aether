name: Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install black ruff mypy

      - name: Run Black (format check)
        run: |
          black --check python/ scripts/ || true

      - name: Run Ruff (linting)
        run: |
          ruff check python/ scripts/ || true

      - name: Run MyPy (type checking)
        run: |
          mypy python/ scripts/ --ignore-missing-imports || true

      - name: Run exarp-go lint (optional)
        id: exarp
        continue-on-error: true
        run: |
          export PATH="${HOME}/go/bin:${PATH}"
          ./scripts/run_exarp_go_tool.sh lint || echo "exarp-go lint skipped or had findings (install exarp-go for full coverage)"
