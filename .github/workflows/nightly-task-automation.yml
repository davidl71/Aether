# Nightly Task Automation
#
# Policy: exarp-go updates Todo2/task state. This repo does not perform direct
# Todo2 edits (scripts that wrote to .todo2/state.todo2.json were removed).
# Use exarp-go MCP (task_workflow, sync_todo_tasks_tool, etc.) or exarp-go CLI
# with workingDirectory set to this repo. See docs/MCP_REQUIRED_SERVERS.md.

name: Nightly Task Automation

on:
  schedule:
    - cron: '0 2 * * *'
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  note:
    name: Task automation via exarp-go
    runs-on: ubuntu-latest
    steps:
      - name: Note
        run: |
          echo "Task/todo updates are performed by exarp-go (MCP or CLI), not by scripts in this repo."
          echo "See docs/MCP_REQUIRED_SERVERS.md and .cursor/rules/project-automation.mdc"
