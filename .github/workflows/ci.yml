name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  toolchain-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run setup_global_tools.sh
        env:
          CI: "true"
        run: bash setup_global_tools.sh

  toolchain-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Run setup_global_tools.sh
        env:
          CI: "true"
        run: bash setup_global_tools.sh

  tui-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21.x'
      - name: Run TUI Go tests
        run: |
          cd agents/tui
          bash scripts/run-tests.sh
