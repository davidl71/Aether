name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  toolchain-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run setup_global_tools.sh
        env:
          CI: "true"
        run: bash setup_global_tools.sh

  toolchain-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Run setup_global_tools.sh
        env:
          CI: "true"
        run: bash setup_global_tools.sh

  proto-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Buf lint and breaking
        run: ./scripts/buf_lint_and_breaking.sh

  homebrew-bottles:
    runs-on: macos-14
    if: startsWith(github.ref, 'refs/tags/')
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      HOMEBREW_NO_INSTALL_CLEANUP: "1"
      HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Configure git for Homebrew
        run: |
          git config --global url."https://${GITHUB_TOKEN}:x-oauth-basic@github.com/".insteadOf "https://github.com/"

      - name: Update Homebrew
        run: brew update

      - name: Set up local tap
        run: |
          brew tap --force-local local/ib-box-spread "$(pwd)/homebrew-tap"

      - name: Build ib-box-spread bottle
        run: |
          FORMULA=ib-box-spread
          brew install --build-bottle local/ib-box-spread/$FORMULA
          brew bottle --json local/ib-box-spread/$FORMULA
          mkdir -p bottles
          mv ${FORMULA}--*.tar.gz bottles/
          mv ${FORMULA}--*.json bottles/
          brew uninstall --force local/ib-box-spread/$FORMULA

      - name: Upload bottles
        uses: actions/upload-artifact@v7
        with:
          name: homebrew-bottles-${{ github.ref_name }}
          path: bottles/
