name: Scheduled PWA Review Analysis

on:
  schedule:
    # Run weekly on Sunday at 02:00 UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:  # Allow manual triggering

jobs:
  pwa-review:
    runs-on: ubuntu-latest
    name: Analyze PWA State and Generate Report

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install optional AI API clients if needed
          # pip install openai anthropic

      - name: Run PWA review analysis
        env:
          # Optional: Set API keys for AI insights
          # OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 scripts/automate_pwa_review.py

      - name: Check for changes
        id: verify-changed-files
        run: |
          if [ -n "$(git status --porcelain docs/PWA_IMPROVEMENT_ANALYSIS.md)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.verify-changed-files.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/PWA_IMPROVEMENT_ANALYSIS.md
          git commit -m "chore: Update PWA improvement analysis [automated]"
          git push

      - name: Create summary
        if: always()
        run: |
          echo "## PWA Review Analysis Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "docs/PWA_IMPROVEMENT_ANALYSIS.md" ]; then
            echo "✅ Analysis document generated successfully" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "View the full analysis: [PWA_IMPROVEMENT_ANALYSIS.md](docs/PWA_IMPROVEMENT_ANALYSIS.md)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Analysis document not found" >> $GITHUB_STEP_SUMMARY
          fi
