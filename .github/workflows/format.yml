name: Format

on:
  workflow_dispatch:

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install format tools
        run: uv tool install black ruff

      - name: Run Black (format code)
        run: uvx black python/ scripts/

      - name: Run Ruff (auto-fix)
        run: uvx ruff check --fix python/ scripts/

      - name: Create Pull Request
        if: github.event_name == 'workflow_dispatch'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "style: Auto-format code with Black and Ruff"
          title: "Auto-format code"
          body: |
            Automated code formatting with Black and Ruff.

            - Black: Code formatting
            - Ruff: Linting and auto-fixes
          branch: auto-format
          delete-branch: true
