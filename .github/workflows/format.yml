name: Format

on:
  workflow_dispatch:
  pull_request:
    branches: [main, develop]

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Black (format code)
        run: |
          black exarp_project_management/ tools/ tests/

      - name: Run Ruff (auto-fix)
        run: |
          ruff check --fix exarp_project_management/ tools/ tests/

      - name: Create Pull Request
        if: github.event_name == 'workflow_dispatch'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "style: Auto-format code with Black and Ruff"
          title: "Auto-format code"
          body: |
            Automated code formatting with Black and Ruff.

            - Black: Code formatting
            - Ruff: Linting and auto-fixes
          branch: auto-format
          delete-branch: true
