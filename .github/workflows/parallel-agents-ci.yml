name: Parallel Agents CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  # Ubuntu Agent Workflow
  ubuntu-agent-tests:
    name: Ubuntu Agent Tests
    runs-on: self-hosted
    labels: [ubuntu, linux]

    strategy:
      fail-fast: false
      matrix:
        component: [backend, nats, tui, web]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git worktree support

      - name: Detect changed files
        id: changes
        uses: dorny/paths-filter@v2
        with:
          filters: |
            backend:
              - 'agents/backend/**'
              - 'native/src/**'
            nats:
              - 'agents/backend/src/nats/**'
            tui:
              - 'agents/tui/**'
            web:
              - 'web/**'

      - name: Setup Rust (for backend/NATS)
        if: matrix.component == 'backend' || matrix.component == 'nats'
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal

      - name: Setup Python (for backend)
        if: matrix.component == 'backend'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js (for web)
        if: matrix.component == 'web'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Run Ubuntu Agent Tests
        run: |
          case "${{ matrix.component }}" in
            backend)
              cd agents/backend
              cargo test --all-features -- --nocapture || true
              ;;
            nats)
              cd agents/backend
              cargo test --package nats_adapter -- --nocapture || true
              ;;
            tui)
              cd agents/tui
              bash scripts/run-tests.sh || true
              ;;
            web)
              cd web
              npm ci
              npm test -- --watch=false || true
              ;;
          esac

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-${{ matrix.component }}-test-results
          path: |
            **/test-results.xml
            **/coverage.xml
            **/*.log
          retention-days: 7

  # macOS M4 Agent Workflow
  macos-agent-tests:
    name: macOS Agent Tests
    runs-on: self-hosted
    labels: [macos, apple-silicon, m4]

    strategy:
      fail-fast: false
      matrix:
        component: [appkit, native-build, universal-binary]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: changes
        uses: dorny/paths-filter@v2
        with:
          filters: |
            appkit:
              - 'native/app/**'
            native-build:
              - 'native/**'
            universal-binary:
              - 'native/**'
              - 'CMakeLists.txt'

      - name: Setup CMake
        uses: actions/setup-cmake@v3
        with:
          cmake-version: '3.28'

      - name: Configure CMake
        run: |
          case "${{ matrix.component }}" in
            appkit|native-build)
              cmake --preset macos-arm64-debug
              ;;
            universal-binary)
              cmake --preset macos-universal-debug
              ;;
          esac

      - name: Build
        run: cmake --build build --parallel

      - name: Run macOS Tests
        run: |
          case "${{ matrix.component }}" in
            appkit)
              ctest --test-dir build -L appkit --output-on-failure || true
              ;;
            native-build)
              ctest --test-dir build --output-on-failure || true
              ;;
            universal-binary)
              cmake --preset macos-universal-debug
              cmake --build build --parallel
              ctest --test-dir build --output-on-failure || true
              ;;
          esac

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.component }}-test-results
          path: |
            build/**/*.app
            build/test-results.xml
            build/*.log
          retention-days: 7

  # Cross-Platform Integration Tests
  integration-tests:
    name: Integration Tests
    runs-on: ${{ matrix.os }}
    needs: [ubuntu-agent-tests, macos-agent-tests]

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Ubuntu test artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ubuntu-*-test-results
          merge-multiple: true
          path: artifacts/ubuntu/

      - name: Download macOS test artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: macos-*-test-results
          merge-multiple: true
          path: artifacts/macos/

      - name: Validate API Contract
        run: |
          bash scripts/validate_api_contract.sh || {
            echo "❌ API Contract validation failed"
            exit 1
          }

      - name: Run Integration Tests
        run: |
          bash scripts/run_integration_tests.sh || {
            echo "❌ Integration tests failed"
            exit 1
          }

      - name: Upload integration results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results-${{ matrix.os }}
          path: integration-results/
          retention-days: 7

  # Coordination Validation
  coordination-validation:
    name: Coordination Validation
    runs-on: ubuntu-latest
    needs: [ubuntu-agent-tests, macos-agent-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate TODO Table
        run: |
          bash scripts/validate_todo_table.sh || {
            echo "❌ TODO Table validation failed"
            exit 1
          }

      - name: Validate TODO2 Sync
        run: |
          bash scripts/validate_todo2_sync.sh || {
            echo "⚠️  TODO2 sync validation failed (non-blocking)"
            echo "Run 'python3 scripts/automate_todo_sync.py' to sync manually"
          }

      - name: Validate API Contract
        run: |
          bash scripts/validate_api_contract.sh || {
            echo "❌ API Contract validation failed"
            exit 1
          }

      - name: Check for merge conflicts
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }}:${{ github.base_ref }}
          git checkout -b test-merge ${{ github.base_ref }}
          git merge --no-commit --no-ff ${{ github.head_ref }} || {
            echo "⚠️  Potential merge conflicts detected"
            echo "Please rebase your branch"
            exit 1
          }
          git merge --abort || true

      - name: Comment on PR
        if: github.event_name == 'pull_request' && success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Coordination validation passed! Both agents are in sync.\n\n- ✅ API Contract valid\n- ✅ TODO Table valid\n- ✅ No merge conflicts detected'
            })

  # Final Status Check
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [ubuntu-agent-tests, macos-agent-tests, integration-tests, coordination-validation]
    if: always()

    steps:
      - name: Check all jobs
        run: |
          if [ "${{ needs.ubuntu-agent-tests.result }}" != "success" ]; then
            echo "❌ Ubuntu agent tests failed"
            exit 1
          fi
          if [ "${{ needs.macos-agent-tests.result }}" != "success" ]; then
            echo "❌ macOS agent tests failed"
            exit 1
          fi
          if [ "${{ needs.integration-tests.result }}" != "success" ]; then
            echo "❌ Integration tests failed"
            exit 1
          fi
          if [ "${{ needs.coordination-validation.result }}" != "success" ]; then
            echo "❌ Coordination validation failed"
            exit 1
          fi
          echo "✅ All CI checks passed!"

      - name: Summary
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Ubuntu Agent Tests | ${{ needs.ubuntu-agent-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS Agent Tests | ${{ needs.macos-agent-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Coordination Validation | ${{ needs.coordination-validation.result }} |" >> $GITHUB_STEP_SUMMARY
