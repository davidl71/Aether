[defaults]
roles_path = roles:ansible/roles
inventory = localhost,
# Allow more time for become/sudo password prompt (e.g. in IDE terminals)
timeout = 60
# Use discovered Python without the "future interpreter could change" warning
interpreter_python = auto_silent
# Show deprecations so playbooks can be updated when upgrading Ansible/collections
deprecation_warnings = True

[privilege_escalation]
become = False

[inventory]
enable_plugins = host_list, script, auto, yaml, ini, toml
