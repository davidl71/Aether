[package]
name = "tui_service"
edition.workspace = true
version.workspace = true
description = "Ratatui terminal UI — subscribes to NATS and renders live trading state"

[[bin]]
name = "tui_service"
path = "src/main.rs"

[dependencies]
anyhow      = { workspace = true }
chrono      = { workspace = true }
serde       = { workspace = true }
serde_json  = { workspace = true }
tokio       = { workspace = true, features = ["rt-multi-thread", "macros", "sync", "time", "signal"] }
tracing     = { workspace = true }
tracing-subscriber = { workspace = true }

# Internal crates
api          = { path = "../../crates/api" }
nats_adapter = { path = "../../crates/nats_adapter" }

# TUI framework
ratatui   = "0.30"
# event-stream enables crossterm::EventStream for async tokio::select! event handling
crossterm = { version = "0.28", features = ["event-stream"] }

# Panic hooks that restore terminal before printing error reports
# TODO(tui-popup): add tui-widgets = { version = "0.5", features = ["tui-popup"] } for
#   order confirmation dialogs, risk-check overlays, and alert detail modals.
# TODO(ratatui-textarea): add ratatui-textarea = "0.7" for interactive symbol/filter
#   input boxes (e.g. "filter symbols", "enter order qty").
# TODO(sparklines): Ratatui built-in Sparkline widget is sufficient — add per-symbol
#   ROI sparkline column to the Dashboard table (needs a ring-buffer of recent roi values
#   stored in SymbolSnapshot or a parallel VecDeque<f64> in app state).
color-eyre = "0.6"

# In-TUI log viewer (captures tracing events, renders them in a scrollable widget)
tui-logger = { version = "0.18", features = ["tracing-support"] }
log = "0.4"

# Protobuf types (for timestamp conversion)
prost-types = "0.13"

# Async utilities
futures = { workspace = true }

# REST fallback
reqwest = { workspace = true, features = ["json"] }
