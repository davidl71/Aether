[package]
name = "tui_service"
edition.workspace = true
version.workspace = true
description = "Ratatui terminal UI — subscribes to NATS and renders live trading state"

[[bin]]
name = "tui_service"
path = "src/main.rs"

[dependencies]
anyhow      = { workspace = true }
chrono      = { workspace = true }
serde       = { workspace = true }
serde_json  = { workspace = true }
tokio       = { workspace = true, features = ["rt-multi-thread", "macros", "sync", "time", "signal"] }
tracing     = { workspace = true }
tracing-subscriber = { workspace = true }

# Internal crates
api          = { path = "../../crates/api" }
nats_adapter = { path = "../../crates/nats_adapter" }

# TUI framework
ratatui   = "0.30"
crossterm = "0.28"

# Protobuf types (for timestamp conversion)
prost-types = "0.13"

# Async utilities
futures = { workspace = true }

# REST fallback
reqwest = { workspace = true, features = ["json"] }
