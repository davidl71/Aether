[package]
name = "tui_service"
edition.workspace = true
version.workspace = true
description = "Ratatui terminal UI — subscribes to NATS and renders read-only portfolio and market state"

[[bin]]
name = "tui_service"
path = "src/main.rs"

[dependencies]
anyhow      = { workspace = true }
chrono      = { workspace = true }
serde       = { workspace = true }
serde_json  = { workspace = true }
tokio       = { workspace = true, features = ["rt-multi-thread", "macros", "sync", "time", "signal"] }
tracing     = { workspace = true }
tracing-subscriber = { workspace = true }

# Internal crates
api          = { path = "../../crates/api", features = ["keyring"] }
common       = { path = "../../crates/common" }
market_data  = { path = "../../crates/market_data", features = ["keyring"] }
nats_adapter = { path = "../../crates/nats_adapter" }

# TUI framework
ratatui   = "0.30"
# event-stream enables crossterm::EventStream for async tokio::select! event handling
crossterm = { version = "0.28", features = ["event-stream"] }

# Optional interactive widget library (kept isolated behind the `tui-interact` feature).
ratatui-interact = { version = "0.5.1", optional = true, default-features = false }

# Panic hooks that restore terminal before printing error reports
color-eyre = "0.6"

# In-TUI log viewer (captures tracing events, renders them in a scrollable widget)
tui-logger = { version = "0.18", features = ["tracing-support"] }
log = "0.4"

# Tree widget spike (hierarchy browsing)
tui-tree-widget = "0.24"

# Protobuf types (for timestamp conversion)
prost-types = "0.13"

# Async utilities
futures = { workspace = true }

# REST fallback
reqwest = { workspace = true, features = ["json"] }

# UUID for event IDs
uuid = { workspace = true }

# JSONC and backoff (see docs/platform/RUST_CRATE_OPPORTUNITIES_AUDIT.md)
jsonc-parser = { workspace = true }
## backoff: replaced by common::backoff (no unmaintained deps)

## Market hours detection: implemented locally (no external calendar dep)

[features]
# Off by default: keeps dependency footprint minimal until a focused prototype needs it.
tui-interact = ["dep:ratatui-interact"]
