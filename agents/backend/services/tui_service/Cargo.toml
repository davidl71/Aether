[package]
name = "tui_service"
edition.workspace = true
version.workspace = true
description = "Ratatui terminal UI — subscribes to NATS and renders live trading state"

[[bin]]
name = "tui_service"
path = "src/main.rs"

[dependencies]
anyhow      = { workspace = true }
chrono      = { workspace = true }
serde       = { workspace = true }
serde_json  = { workspace = true }
tokio       = { workspace = true, features = ["rt-multi-thread", "macros", "sync", "time", "signal"] }
tracing     = { workspace = true }
tracing-subscriber = { workspace = true }

# Internal crates
api          = { path = "../../crates/api" }
nats_adapter = { path = "../../crates/nats_adapter" }

# TUI framework
ratatui   = "0.30"
# event-stream enables crossterm::EventStream for async tokio::select! event handling
crossterm = { version = "0.28", features = ["event-stream"] }

# Panic hooks that restore terminal before printing error reports
color-eyre = "0.6"

# In-TUI log viewer (captures tracing events, renders them in a scrollable widget)
tui-logger = { version = "0.18", features = ["tracing-support"] }
log = "0.4"

# Protobuf types (for timestamp conversion)
prost-types = "0.13"

# Async utilities
futures = { workspace = true }

# REST fallback
reqwest = { workspace = true, features = ["json"] }

# UUID for event IDs
uuid = { workspace = true }

# JSONC and backoff (see docs/platform/RUST_CRATE_OPPORTUNITIES_AUDIT.md)
jsonc-parser = { workspace = true }
backoff = { workspace = true }
