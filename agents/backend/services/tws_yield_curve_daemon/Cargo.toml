[package]
name = "tws_yield_curve_daemon"
edition = "2021"
version.workspace = true
description = "Standalone daemon: TWS option chain + quotes → NATS KV yield_curve.{symbol}"

[[bin]]
name = "tws_yield_curve_daemon"
path = "src/main.rs"

[dependencies]
api = { path = "../../crates/api" }
backoff = { workspace = true }
bytes = "1.5"
nats_adapter = { path = "../../crates/nats_adapter" }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "time", "net", "signal"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tws_yield_curve = { path = "../../crates/tws_yield_curve" }
