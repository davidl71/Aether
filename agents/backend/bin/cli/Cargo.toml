[package]
name = "cli"
description = "Aether CLI - Command-line interface for the trading platform"
edition.workspace = true
version.workspace = true
license.workspace = true

[dependencies]
# Workspace dependencies
anyhow.workspace = true
chrono.workspace = true
serde.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true

# CLI argument parsing
clap = { version = "4", features = ["derive", "env"] }
clap_complete = "4"

# Configuration: shared JSON (same as TUI/backend) + TOML fallback
api = { path = "../../crates/api", features = ["keyring"] }
nats_adapter = { path = "../../crates/nats_adapter" }
tws_yield_curve = { path = "../../crates/tws_yield_curve" }
discount_bank_parser = { path = "../../crates/discount_bank_parser" }
rust_decimal = { workspace = true }
pdf-extract = "0.10"
regex = { workspace = true }
serde_json.workspace = true
toml.workspace = true
tokio.workspace = true
reqwest.workspace = true


[features]
default = []
