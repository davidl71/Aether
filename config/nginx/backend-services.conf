# Reverse proxy for all backend services (single hostname, path-based routing).
# Include from nginx.conf or sites-enabled. Requires: proxy_pass and related modules.
#
# Install (example):
#   sudo cp config/nginx/backend-services.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/backend-services.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Or include from main nginx.conf:
#   include /path/to/project/config/nginx/backend-services.conf;
#
# Frontend: set VITE_API_URL to http://localhost:8080/api (default backend) or
# use path-prefixed URLs: /api/ib/snapshot, /api/alpaca/snapshot, etc.

upstream backend_ib            { server 127.0.0.1:8002; }
upstream backend_alpaca        { server 127.0.0.1:8000; }
upstream backend_tradestation   { server 127.0.0.1:8001; }
upstream backend_tastytrade     { server 127.0.0.1:8005; }
upstream backend_discount_bank  { server 127.0.0.1:8003; }
upstream backend_risk_free_rate { server 127.0.0.1:8004; }
upstream backend_analytics       { server 127.0.0.1:8007; }
upstream backend_health_dashboard { server 127.0.0.1:8011; }
upstream backend_rust            { server 127.0.0.1:8080; }
upstream backend_web            { server 127.0.0.1:5173; }

server {
    listen 8080;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Path-based routing to backends (strip path prefix when proxying)
    location /api/ib/ {
        proxy_pass http://backend_ib/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }
    location /api/alpaca/ {
        proxy_pass http://backend_alpaca/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }
    location /api/tradestation/ {
        proxy_pass http://backend_tradestation/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }
    location /api/tastytrade/ {
        proxy_pass http://backend_tastytrade/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }
    location /api/discount_bank/ {
        proxy_pass http://backend_discount_bank/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }
    location /api/risk_free_rate/ {
        proxy_pass http://backend_risk_free_rate/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }
    location /api/analytics/ {
        proxy_pass http://backend_analytics/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }
    # Unified health JSON (NATS-driven); for services/dashboards
    location = /api/health-aggregated {
        proxy_pass http://backend_health_dashboard/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }
    location /api/rust/ {
        proxy_pass http://backend_rust/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # Default /api -> IB service (so PWA with VITE_API_URL=http://localhost:8080/api works)
    location /api/ {
        proxy_pass http://backend_ib/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # Optional: proxy Vite dev server (web) so single origin for dev
    location / {
        proxy_pass http://backend_web/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
