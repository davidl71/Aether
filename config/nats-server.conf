# NATS Server Configuration for Development
# This configuration is optimized for local development

# Server port (default: 4222)
port: 4222

# HTTP monitoring port (default: 8222)
http_port: 8222

# Host (bind to all interfaces for development)
host: "0.0.0.0"

# Logging
debug: false
trace: false
logtime: true
log_file: "logs/nats-server.log"
log_size_limit: 100MB

# Connection limits
max_connections: 1000
max_payload: 1048576  # 1MB

# Ping interval (duration format)
ping_interval: "20s"
ping_max: 2

# Write deadline (duration format)
write_deadline: "10s"

# Cluster configuration (disabled for development)
# Uncomment for clustering:
# cluster {
#   port: 6222
#   routes = [
#     "nats://localhost:6222"
#   ]
# }

# JetStream -- persistent streams for market data, orders, strategy decisions
jetstream {
  store_dir: "data/jetstream"
  max_mem: 256MB
  max_file: 1GB
}

# Authentication (disabled for development)
# Uncomment for production:
# authorization {
#   users = [
#     { user: "backend", password: "$2a$..." }
#   ]
# }

# WebSocket support (for browser clients)
# Changed from 8080 to 8081 to avoid conflict with Rust backend REST API
websocket {
  port: 8081
  no_tls: true
}

# TLS (disabled for development)
# Uncomment for production:
# tls {
#   cert_file: "certs/server-cert.pem"
#   key_file: "certs/server-key.pem"
# }
